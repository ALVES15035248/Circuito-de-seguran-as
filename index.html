<!DOCTYPE html>

    <style>

        .search-container { position: relative; margin-bottom: 20px; }
        input#searchBar { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input#searchBar:focus { border-color: #3b82f6; }
        .list-container { max-height: 250px; overflow-y: auto; background: white; border-radius: 10px; border: 1px solid #e2e8f0; display: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .list-item { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; cursor: pointer; font-size: 15px; }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover, .list-item.active { background-color: #eff6ff; color: #1d4ed8; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: none; border: 1px solid #e2e8f0; }
        .manobra-header { font-size: 18px; font-weight: bold; color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; }
        .passo { background: #f8fafc; border-left: 5px solid #3b82f6; margin: 10px 0; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 500; display: flex; align-items: center; }
        .passo span { margin-right: 10px; color: #3b82f6; font-weight: bold; }
        .dica { background: #fef3c7; border-left: 5px solid #f59e0b; margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 14px; color: #78350f; line-height: 1.5; }
    </style>
</head>

        // Lógica do Motor de Busca com Auto-completar

            const input = document.getElementById("searchBar").value.toLowerCase();
            const lista = document.getElementById("listaSugestoes");
            lista.innerHTML = "";
            
            if (!input) {
                lista.style.display = "none";
